<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LendrTrack – Loan Manager</title>
<meta name="theme-color" content="#0d0f14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LendrTrack">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #141720;
    --surface2: #1c2030;
    --border: #272d3f;
    --accent: #f0b429;
    --accent2: #ff6b35;
    --text: #e8eaf0;
    --muted: #7a8099;
    --green: #2dd4bf;
    --red: #f87171;
    --whatsapp: #25D366;
    --urgent1: #ff4444;
    --urgent2: #ff7722;
    --urgent3: #ffaa00;
    --urgent4: #aacc22;
    --safe: #2dd4bf;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    padding: 24px 40px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(135deg, #0d0f14 0%, #141720 100%);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 24px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--accent); }
  .header-stats {
    display: flex;
    gap: 32px;
  }
  .stat-pill {
    text-align: center;
  }
  .stat-pill .val {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
  }
  .stat-pill .lbl {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .add-btn {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 10px 22px;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s;
  }
  .add-btn:hover { background: #ffc94d; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(240,180,41,0.3); }

  /* MAIN */
  main { padding: 36px 40px; }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 20px;
  }

  /* LEGEND */
  .legend {
    display: flex;
    gap: 20px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 11px;
    color: var(--muted);
  }
  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }

  /* CARDS GRID */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
  }

  .client-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
  }
  .client-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.4);
  }

  /* urgency left stripe */
  .client-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    border-radius: 16px 0 0 16px;
  }

  .card-top {
    padding: 20px 20px 16px 24px;
    border-bottom: 1px solid var(--border);
  }
  .card-name-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 4px;
  }
  .client-name {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
  }
  .days-badge {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .client-amount {
    font-size: 22px;
    font-weight: 500;
    color: var(--accent);
    margin: 6px 0 2px;
  }
  .client-rate {
    font-size: 11px;
    color: var(--muted);
  }

  .card-body {
    padding: 14px 24px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .info-item .key {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 2px;
  }
  .info-item .value {
    font-size: 13px;
    font-weight: 500;
  }

  /* PROGRESS BAR */
  .progress-wrap {
    padding: 0 24px 14px;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 5px;
  }
  .progress-bar {
    height: 5px;
    background: var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 10px;
    transition: width 0.6s ease;
  }

  .card-actions {
    padding: 12px 20px 16px 24px;
    display: flex;
    gap: 10px;
    border-top: 1px solid var(--border);
  }
  .wa-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--whatsapp);
    color: #fff;
    border: none;
    padding: 8px 16px;
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    flex: 1;
    justify-content: center;
  }
  .wa-btn:hover { background: #1ebe5d; transform: scale(1.02); }
  .edit-btn {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 8px 14px;
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .edit-btn:hover { border-color: var(--accent); color: var(--accent); }
  .del-btn {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 13px;
  }
  .del-btn:hover { border-color: var(--red); color: var(--red); }
  .paid-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    background: linear-gradient(135deg, #16a34a, #22c55e);
    color: #fff;
    border: none;
    padding: 8px 16px;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    flex: 1;
    justify-content: center;
    box-shadow: 0 2px 12px rgba(34,197,94,0.35);
    animation: paidPulse 2s infinite;
  }
  @keyframes paidPulse {
    0%, 100% { box-shadow: 0 2px 12px rgba(34,197,94,0.35); }
    50% { box-shadow: 0 2px 20px rgba(34,197,94,0.65); }
  }
  .paid-btn:hover { background: linear-gradient(135deg, #15803d, #16a34a); transform: scale(1.02); }
  .paid-done {
    display: flex;
    align-items: center;
    gap: 7px;
    background: rgba(34,197,94,0.1);
    color: #22c55e;
    border: 1px solid rgba(34,197,94,0.3);
    padding: 8px 16px;
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: default;
    flex: 1;
    justify-content: center;
    animation: none;
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state h3 { font-family: 'Syne', sans-serif; font-size: 20px; margin-bottom: 8px; color: var(--text); }
  .empty-state p { font-size: 13px; }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    width: 460px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
    animation: modalIn 0.25s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .modal-title {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    margin-bottom: 24px;
  }
  .modal-title span { color: var(--accent); }
  .form-group { margin-bottom: 18px; }
  .form-group label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 7px;
  }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    transition: border-color 0.2s;
  }
  .form-group input:focus, .form-group select:focus {
    outline: none;
    border-color: var(--accent);
  }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .modal-actions { display: flex; gap: 12px; margin-top: 24px; }
  .btn-primary {
    flex: 1;
    background: var(--accent);
    color: #000;
    border: none;
    padding: 12px;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary:hover { background: #ffc94d; }
  .btn-cancel {
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 12px 20px;
    border-radius: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-cancel:hover { color: var(--text); border-color: var(--text); }

  .interest-info {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-top: 16px;
    font-size: 12px;
    color: var(--muted);
  }
  .interest-info strong { color: var(--accent); font-size: 16px; display: block; margin-bottom: 2px; }

  /* OVERDUE banner */
  .overdue-badge {
    background: rgba(248, 113, 113, 0.15);
    border: 1px solid rgba(248, 113, 113, 0.4);
    color: var(--red);
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 500;
  }

  @media (max-width: 640px) {
    header { padding: 16px 20px; flex-wrap: wrap; gap: 14px; }
    main { padding: 24px 20px; }
    .header-stats { gap: 16px; }
  }

  /* ── AUTH SCREENS ── */
  #authScreen {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  #authScreen.show { display: flex; }
  .auth-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 40px 36px;
    width: 400px;
    max-width: 95vw;
    animation: modalIn 0.3s ease;
  }
  .auth-logo {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    text-align: center;
    margin-bottom: 6px;
  }
  .auth-logo span { color: var(--accent); }
  .auth-subtitle {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 32px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .auth-input-wrap { position: relative; margin-bottom: 16px; }
  .auth-input-wrap label {
    display: block;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .auth-input-wrap input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    transition: border-color 0.2s;
  }
  .auth-input-wrap input:focus { outline: none; border-color: var(--accent); }
  .auth-btn {
    width: 100%;
    background: var(--accent);
    color: #000;
    border: none;
    padding: 13px;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.2s;
  }
  .auth-btn:hover { background: #ffc94d; transform: translateY(-1px); }
  .auth-error {
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.4);
    color: var(--red);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    margin-bottom: 16px;
    display: none;
  }
  .auth-error.show { display: block; }
  .auth-switch {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin-top: 20px;
  }
  .auth-switch a {
    color: var(--accent);
    cursor: pointer;
    text-decoration: none;
    font-weight: 500;
  }
  .auth-switch a:hover { text-decoration: underline; }
  .logout-btn {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 8px 16px;
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .logout-btn:hover { border-color: var(--red); color: var(--red); }
</style>
</head>
<body>


<!-- AUTH SCREEN -->
<div id="authScreen">
  <div class="auth-box">
    <div class="auth-logo">Lendr<span>Track</span></div>
    <div class="auth-subtitle" id="authSubtitle">Sign in to continue</div>

    <div class="auth-error" id="authError"></div>

    <div id="authForm">
      <div class="auth-input-wrap">
        <label>Username</label>
        <input type="text" id="authUser" placeholder="Enter username" autocomplete="username">
      </div>
      <div class="auth-input-wrap">
        <label>Password</label>
        <input type="password" id="authPass" placeholder="Enter password" autocomplete="current-password">
      </div>
      <div class="auth-input-wrap" id="authConfirmWrap" style="display:none">
        <label>Confirm Password</label>
        <input type="password" id="authConfirm" placeholder="Re-enter password">
      </div>
      <button class="auth-btn" id="authSubmitBtn" onclick="handleAuth()">Sign In</button>
    </div>

    <div class="auth-switch" id="authSwitchText">
      First time? <a onclick="switchToSetup()">Create your account</a>
    </div>
  </div>
</div>

<header>
  <div class="logo">Lendr<span>Track</span></div>
  <div class="header-stats">
    <div class="stat-pill">
      <div class="val" id="totalLent">₹0</div>
      <div class="lbl">Total Lent</div>
    </div>
    <div class="stat-pill">
      <div class="val" id="totalInterest">₹0</div>
      <div class="lbl">Interest Due</div>
    </div>
    <div class="stat-pill">
      <div class="val" id="clientCount">0</div>
      <div class="lbl">Clients</div>
    </div>
  </div>
  <button class="logout-btn" onclick="logout()" style="margin-right:8px">⏻ Logout</button>
  <button class="add-btn" onclick="openModal()">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
    Add Client
  </button>
</header>

<main>
  <div class="section-title">Active Loans</div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#ff4444"></div> Overdue / 0-3 days</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ff7722"></div> 4-7 days</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ffaa00"></div> 8-15 days</div>
    <div class="legend-item"><div class="legend-dot" style="background:#aacc22"></div> 16-30 days</div>
    <div class="legend-item"><div class="legend-dot" style="background:#2dd4bf"></div> 30+ days</div>
  </div>

  <div class="empty-state" id="emptyState">
    <div class="icon">💰</div>
    <h3>No clients yet</h3>
    <p>Click "Add Client" to start tracking your loans.</p>
  </div>
  <div class="cards-grid" id="cardsGrid"></div>
</main>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Add <span>Client</span></div>
    <input type="hidden" id="editId">

    <div class="form-group">
      <label>Client Name</label>
      <input type="text" id="fName" placeholder="e.g. Rahul Sharma">
    </div>
    <div class="form-group">
      <label>WhatsApp Number</label>
      <input type="tel" id="fPhone" placeholder="91XXXXXXXXXX (with country code)">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Principal Amount (₹)</label>
        <input type="number" id="fAmount" placeholder="50000">
      </div>
      <div class="form-group">
        <label>Interest Rate (% / month)</label>
        <input type="number" id="fRate" placeholder="2" step="0.1">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Loan Start Date</label>
        <input type="date" id="fStart">
      </div>
      <div class="form-group">
        <label>Interest Due Date</label>
        <input type="date" id="fDue">
      </div>
    </div>
    <div class="form-group">
      <label>Notes (optional)</label>
      <input type="text" id="fNotes" placeholder="Collateral, purpose, etc.">
    </div>

    <div class="interest-info" id="interestPreview" style="display:none">
      <strong id="interestAmt">₹0</strong>
      Estimated interest due
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveClient()">Save Client</button>
    </div>
  </div>
</div>

<script>

  // ── AUTH ──
  let authMode = 'login'; // 'login' or 'setup'

  function initAuth() {
    const creds = localStorage.getItem('lendrtrack_creds');
    if (!creds) {
      switchToSetup();
    }
    document.getElementById('authScreen').classList.add('show');
    document.getElementById('authUser').focus();

    // Allow Enter key to submit
    ['authUser','authPass','authConfirm'].forEach(id => {
      document.getElementById(id).addEventListener('keydown', e => {
        if (e.key === 'Enter') handleAuth();
      });
    });
  }

  function switchToSetup() {
    authMode = 'setup';
    document.getElementById('authSubtitle').textContent = 'Create your account';
    document.getElementById('authConfirmWrap').style.display = '';
    document.getElementById('authSubmitBtn').textContent = 'Create Account';
    document.getElementById('authSwitchText').innerHTML = 'Already have an account? <a onclick="switchToLogin()">Sign in</a>';
    clearAuthError();
  }

  function switchToLogin() {
    authMode = 'login';
    document.getElementById('authSubtitle').textContent = 'Sign in to continue';
    document.getElementById('authConfirmWrap').style.display = 'none';
    document.getElementById('authSubmitBtn').textContent = 'Sign In';
    document.getElementById('authSwitchText').innerHTML = 'First time? <a onclick="switchToSetup()">Create your account</a>';
    clearAuthError();
  }

  function showAuthError(msg) {
    const el = document.getElementById('authError');
    el.textContent = msg;
    el.classList.add('show');
  }

  function clearAuthError() {
    document.getElementById('authError').classList.remove('show');
  }

  function handleAuth() {
    const user = document.getElementById('authUser').value.trim();
    const pass = document.getElementById('authPass').value;
    clearAuthError();

    if (!user || !pass) {
      showAuthError('Please fill in all fields.');
      return;
    }

    if (authMode === 'setup') {
      const confirm = document.getElementById('authConfirm').value;
      if (pass !== confirm) {
        showAuthError('Passwords do not match.');
        return;
      }
      if (pass.length < 4) {
        showAuthError('Password must be at least 4 characters.');
        return;
      }
      localStorage.setItem('lendrtrack_creds', JSON.stringify({ user, pass }));
      document.getElementById('authScreen').classList.remove('show');
    } else {
      const creds = JSON.parse(localStorage.getItem('lendrtrack_creds') || 'null');
      if (!creds || creds.user !== user || creds.pass !== pass) {
        showAuthError('Invalid username or password.');
        document.getElementById('authPass').value = '';
        return;
      }
      document.getElementById('authScreen').classList.remove('show');
    }
  }

  function logout() {
    document.getElementById('authUser').value = '';
    document.getElementById('authPass').value = '';
    document.getElementById('authConfirm').value = '';
    switchToLogin();
    document.getElementById('authScreen').classList.add('show');
    setTimeout(() => document.getElementById('authUser').focus(), 100);
  }

  initAuth();

  let clients = JSON.parse(localStorage.getItem('lendrtrack_clients') || '[]');
  let editingId = null;

  function save() {
    localStorage.setItem('lendrtrack_clients', JSON.stringify(clients));
  }

  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2);
  }

  function getDaysRemaining(dueDateStr) {
    const due = new Date(dueDateStr);
    due.setHours(0,0,0,0);
    const today = new Date();
    today.setHours(0,0,0,0);
    return Math.round((due - today) / 86400000);
  }

  function getUrgencyColor(days) {
    if (days <= 3) return { color: '#ff4444', bg: 'rgba(255,68,68,0.12)', border: 'rgba(255,68,68,0.35)' };
    if (days <= 7) return { color: '#ff7722', bg: 'rgba(255,119,34,0.12)', border: 'rgba(255,119,34,0.35)' };
    if (days <= 15) return { color: '#ffaa00', bg: 'rgba(255,170,0,0.12)', border: 'rgba(255,170,0,0.35)' };
    if (days <= 30) return { color: '#aacc22', bg: 'rgba(170,204,34,0.12)', border: 'rgba(170,204,34,0.35)' };
    return { color: '#2dd4bf', bg: 'rgba(45,212,191,0.08)', border: 'rgba(45,212,191,0.2)' };
  }

  function calcInterest(amount, rate, startDate, dueDate) {
    const start = new Date(startDate);
    const due = new Date(dueDate);
    const months = (due - start) / (1000 * 60 * 60 * 24 * 30.44);
    return (amount * (rate / 100) * months);
  }

  function getLoanProgress(startDate, dueDate) {
    const start = new Date(startDate).getTime();
    const due = new Date(dueDate).getTime();
    const now = Date.now();
    if (now >= due) return 100;
    if (now <= start) return 0;
    return Math.round(((now - start) / (due - start)) * 100);
  }

  function formatINR(n) {
    return '₹' + Math.round(n).toLocaleString('en-IN');
  }

  function buildWALink(phone, client) {
    const days = getDaysRemaining(client.dueDate);
    let msg;
    if (days <= 0) {
      msg = `Namaste ${client.name}, this is a reminder that the interest payment of ${formatINR(calcInterest(client.amount, client.rate, client.startDate, client.dueDate))} on your loan of ${formatINR(client.amount)} was due on ${new Date(client.dueDate).toLocaleDateString('en-IN')}. Please arrange for payment at the earliest. Thank you.`;
    } else {
      msg = `Namaste ${client.name}, your interest payment of ${formatINR(calcInterest(client.amount, client.rate, client.startDate, client.dueDate))} on the loan of ${formatINR(client.amount)} is due in ${days} day(s) on ${new Date(client.dueDate).toLocaleDateString('en-IN')}. Please make arrangements accordingly. Thank you.`;
    }
    return `https://wa.me/${phone.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`;
  }

  function renderCards() {
    const grid = document.getElementById('cardsGrid');
    const empty = document.getElementById('emptyState');

    // sort by days remaining ascending
    const sorted = [...clients].sort((a, b) => getDaysRemaining(a.dueDate) - getDaysRemaining(b.dueDate));

    grid.innerHTML = '';

    if (sorted.length === 0) {
      empty.style.display = '';
      updateStats();
      return;
    }

    empty.style.display = 'none';
    sorted.forEach(c => {
      const days = getDaysRemaining(c.dueDate);
      const urg = getUrgencyColor(days);
      const interest = calcInterest(c.amount, c.rate, c.startDate, c.dueDate);
      const progress = getLoanProgress(c.startDate, c.dueDate);
      const isOverdue = days < 0;

      const card = document.createElement('div');
      card.className = 'client-card';
      card.style.borderColor = urg.border;
      card.style.background = `linear-gradient(135deg, ${urg.bg} 0%, var(--surface) 60%)`;
      card.style.setProperty('--stripe', urg.color);
      card.style.cssText += `border-color: ${urg.border};`;

      const stripe = document.createElement('div');
      stripe.style.cssText = `position:absolute;left:0;top:0;bottom:0;width:4px;background:${urg.color};border-radius:16px 0 0 16px;`;
      card.appendChild(stripe);

      const dayLabel = isOverdue ? `${Math.abs(days)}d overdue` : days === 0 ? 'Due Today!' : `${days}d left`;

      card.innerHTML += `
        <div class="card-top">
          <div class="card-name-row">
            <div class="client-name">${escHtml(c.name)}</div>
            <div style="display:flex;align-items:center;gap:7px">
              ${isOverdue ? '<span class="overdue-badge">OVERDUE</span>' : ''}
              <div class="days-badge" style="background:${urg.bg};color:${urg.color};border:1px solid ${urg.border}">${dayLabel}</div>
            </div>
          </div>
          <div class="client-amount">${formatINR(c.amount)}</div>
          <div class="client-rate">${c.rate}% / month &nbsp;·&nbsp; Interest: ${formatINR(interest)}</div>
        </div>
        <div class="card-body">
          <div class="info-item">
            <div class="key">Start Date</div>
            <div class="value">${new Date(c.startDate).toLocaleDateString('en-IN')}</div>
          </div>
          <div class="info-item">
            <div class="key">Due Date</div>
            <div class="value" style="color:${urg.color}">${new Date(c.dueDate).toLocaleDateString('en-IN')}</div>
          </div>
          <div class="info-item">
            <div class="key">Phone</div>
            <div class="value">${escHtml(c.phone) || '—'}</div>
          </div>
          <div class="info-item">
            <div class="key">Notes</div>
            <div class="value" style="color:var(--muted);font-size:11px">${escHtml(c.notes) || '—'}</div>
          </div>
        </div>
        <div class="progress-wrap">
          <div class="progress-label">
            <span>Loan period</span>
            <span>${progress}%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" style="width:${progress}%;background:${urg.color}"></div>
          </div>
        </div>
        <div class="card-actions">
          ${c.phone ? `<button class="wa-btn" onclick="window.open('${buildWALink(c.phone, c)}','_blank')">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            Send Reminder
          </button>` : `<button class="wa-btn" style="opacity:0.4;cursor:not-allowed" disabled>No Phone</button>`}
          ${days <= 5 ? (c.paidThisCycle
            ? `<div class="paid-done">✓ Paid — awaiting next cycle</div>`
            : `<button class="paid-btn" onclick="markPaid('${c.id}')">
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
                Mark Paid
              </button>`)
            : ''}
          <button class="edit-btn" onclick="editClient('${c.id}')">Edit</button>
          <button class="del-btn" onclick="deleteClient('${c.id}')">🗑</button>
        </div>
      `;

      grid.appendChild(card);
    });

    updateStats();
  }

  function updateStats() {
    const total = clients.reduce((s, c) => s + Number(c.amount), 0);
    const totalInt = clients.reduce((s, c) => s + calcInterest(c.amount, c.rate, c.startDate, c.dueDate), 0);
    document.getElementById('totalLent').textContent = formatINR(total);
    document.getElementById('totalInterest').textContent = formatINR(totalInt);
    document.getElementById('clientCount').textContent = clients.length;
  }

  function openModal(id = null) {
    editingId = id;
    document.getElementById('editId').value = id || '';
    const modal = document.getElementById('modalOverlay');
    modal.classList.add('open');

    if (id) {
      const c = clients.find(x => x.id === id);
      document.getElementById('modalTitle').innerHTML = 'Edit <span>Client</span>';
      document.getElementById('fName').value = c.name;
      document.getElementById('fPhone').value = c.phone;
      document.getElementById('fAmount').value = c.amount;
      document.getElementById('fRate').value = c.rate;
      document.getElementById('fStart').value = c.startDate;
      document.getElementById('fDue').value = c.dueDate;
      document.getElementById('fNotes').value = c.notes || '';
    } else {
      document.getElementById('modalTitle').innerHTML = 'Add <span>Client</span>';
      document.getElementById('fName').value = '';
      document.getElementById('fPhone').value = '';
      document.getElementById('fAmount').value = '';
      document.getElementById('fRate').value = '';
      document.getElementById('fStart').value = new Date().toISOString().split('T')[0];
      document.getElementById('fDue').value = '';
      document.getElementById('fNotes').value = '';
      document.getElementById('interestPreview').style.display = 'none';
    }
    updateInterestPreview();
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    editingId = null;
  }

  function updateInterestPreview() {
    const amount = parseFloat(document.getElementById('fAmount').value);
    const rate = parseFloat(document.getElementById('fRate').value);
    const start = document.getElementById('fStart').value;
    const due = document.getElementById('fDue').value;
    const preview = document.getElementById('interestPreview');
    if (amount && rate && start && due) {
      const int = calcInterest(amount, rate, start, due);
      document.getElementById('interestAmt').textContent = formatINR(int);
      preview.style.display = '';
    } else {
      preview.style.display = 'none';
    }
  }

  ['fAmount','fRate','fStart','fDue'].forEach(id => {
    document.getElementById(id).addEventListener('input', updateInterestPreview);
  });

  function saveClient() {
    const name = document.getElementById('fName').value.trim();
    const phone = document.getElementById('fPhone').value.trim();
    const amount = parseFloat(document.getElementById('fAmount').value);
    const rate = parseFloat(document.getElementById('fRate').value);
    const startDate = document.getElementById('fStart').value;
    const dueDate = document.getElementById('fDue').value;
    const notes = document.getElementById('fNotes').value.trim();

    if (!name || !amount || !rate || !startDate || !dueDate) {
      alert('Please fill in all required fields.');
      return;
    }

    if (editingId) {
      const idx = clients.findIndex(x => x.id === editingId);
      clients[idx] = { ...clients[idx], name, phone, amount, rate, startDate, dueDate, notes };
    } else {
      clients.push({ id: uid(), name, phone, amount, rate, startDate, dueDate, notes });
    }

    save();
    renderCards();
    closeModal(); // ✅ Fixed: removed the broken document.getElementById("clientForm").reset() call
  }

  function editClient(id) {
    openModal(id);
  }

  function markPaid(id) {
    const idx = clients.findIndex(c => c.id === id);
    if (idx === -1) return;
    const c = clients[idx];

    // Advance due date by exactly 1 month (same day-of-month)
    const oldDue = new Date(c.dueDate);
    const newDue = new Date(oldDue);
    newDue.setMonth(newDue.getMonth() + 1);
    // Handle month-end edge cases (e.g. Jan 31 → Feb 28)
    if (newDue.getDate() !== oldDue.getDate()) {
      newDue.setDate(0); // last day of previous month
    }
    const newDueStr = newDue.toISOString().split('T')[0];

    // Record payment history
    const paymentRecord = {
      paidOn: new Date().toISOString().split('T')[0],
      forDueDate: c.dueDate,
      interest: calcInterest(c.amount, c.rate, c.startDate, c.dueDate)
    };
    const history = c.paymentHistory || [];
    history.push(paymentRecord);

    // Advance: new start = old due date, new due = old due + 1 month
    clients[idx] = {
      ...c,
      startDate: c.dueDate,       // new cycle starts from old due date
      dueDate: newDueStr,          // next due = same day next month
      paidThisCycle: false,        // reset for new cycle
      paymentHistory: history
    };

    save();
    renderCards();

    // Flash confirmation
    const toast = document.createElement('div');
    toast.textContent = `✓ Payment recorded for ${c.name}. Next due: ${new Date(newDueStr).toLocaleDateString('en-IN')}`;
    toast.style.cssText = `position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#22c55e;color:#000;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;padding:12px 24px;border-radius:10px;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,0.4);transition:opacity 0.5s;white-space:nowrap`;
    document.body.appendChild(toast);
    setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 500); }, 2800);
  }

  function deleteClient(id) {
    const client = clients.find(c => c.id === id);
    if (!client) return;

    const existing = document.getElementById('deleteConfirm');
    if (existing) existing.remove();

    const dialog = document.createElement('div');
    dialog.id = 'deleteConfirm';
    dialog.style.cssText = 'position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#1c2030;border:1px solid #f87171;border-radius:12px;padding:16px 20px;z-index:999;box-shadow:0 8px 32px rgba(0,0,0,0.6);display:flex;align-items:center;gap:14px;font-family:\'DM Mono\',monospace;font-size:13px;white-space:nowrap';
    dialog.innerHTML = `
      <span style="color:#e8eaf0">Delete <strong style="color:#f87171">${escHtml(client.name)}</strong>?</span>
      <button id="confirmYes" style="background:#f87171;color:#000;border:none;padding:7px 16px;border-radius:7px;font-family:'Syne',sans-serif;font-weight:700;font-size:12px;cursor:pointer">Delete</button>
      <button id="confirmNo" style="background:#272d3f;color:#7a8099;border:1px solid #272d3f;padding:7px 14px;border-radius:7px;font-family:'DM Mono',monospace;font-size:12px;cursor:pointer">Cancel</button>
    `;
    document.body.appendChild(dialog);

    document.getElementById('confirmYes').onclick = () => {
      clients = clients.filter(c => c.id !== id);
      save();
      renderCards();
      dialog.remove();
    };
    document.getElementById('confirmNo').onclick = () => dialog.remove();

    setTimeout(() => { if (dialog.parentNode) dialog.remove(); }, 6000);
  }

  function escHtml(str) {
    return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // close modal on overlay click
  document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  // Clear any previously seeded sample data
  const demoNames = ['Arjun Mehta', 'Priya Kapoor', 'Suresh Rathi', 'Kavita Singh'];
  const hadDemo = clients.some(c => demoNames.includes(c.name));
  if (hadDemo) {
    clients = clients.filter(c => !demoNames.includes(c.name));
    save();
  }

  renderCards();
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
</body>
